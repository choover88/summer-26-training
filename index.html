<title>My 12-Week Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Poppins', sans-serif; }
body { background: #f4f7f8; color: #1f2d2e; min-height: 100vh; font-size: 14px; }

.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #5f7f8e; }

.legend-dot.ns { background: #eaf2f3; border: 1px solid #b8d8db; }

.wk-progress { display: flex; gap: 8px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #d8dee4; align-items: center; }
.wk-prog-label { font-size: 10px; color: #958099; font-weight: 600; white-space: nowrap; }
.wk-prog-bar-bg { flex: 1; height: 6px; background: #d8dee4; border-radius: 3px; overflow: hidden; }

.wb { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 5px 10px; border-radius: 20px; border: 1.5px solid #d8dee4; background: #fff; color: #5f7f8e; cursor: pointer; }

.wb.dl { border-style: dashed; }

.day-sec { padding: 12px 12px 0; }

.panel-title { font-size: 16px; font-weight: 700; color: #1f2d2e; margin-bottom: 8px; line-height: 1.2; }
.tags { display: flex; gap: 5px; flex-wrap: wrap; }

.tag.lift { background: #eaf2f3; color: #1f5e63; } .tag.run { background: #e8f5ee; color: #1a6b3c; }
.tag.spd { background: #fce8f6; color: #8a2270; } .tag.lng { background: #fef3e2; color: #7a4a0a; }
.tag.rst { background: #f4f7f8; color: #958099; } .tag.dl { background: #fce8f6; color: #8a2270; }

.panel-body { padding: 14px 16px; }
.complete-bar { display: flex; gap: 8px; margin-bottom: 14px; }
.comp-btn { flex: 1; font-size: 12px; font-weight: 700; padding: 11px 6px; border-radius: 10px; border: 2px solid #d8dee4; background: #f9fbfc; color: #958099; cursor: pointer; text-align: center; min-height: 44px; transition: all 0.15s; }
.comp-btn.done { background: #1f5e63; border-color: #1f5e63; color: #fff; }

.stats { display: flex; gap: 7px; margin-bottom: 12px; }

.log-edit { font-size: 11px; color: #958099; background: #fff; border: 1px solid #d8dee4; border-radius: 8px; padding: 4px 9px; cursor: pointer; min-height: 30px; }

.focus-t { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #1f5e63; margin-bottom: 4px; }
.focus-b { font-size: 12px; color: #2d5c60; line-height: 1.6; }
.rest-box { background: #f4f7f8; border: 1px solid #d8dee4; border-radius: 12px; padding: 24px; text-align: center; }
.rest-e { font-size: 36px; margin-bottom: 8px; }
.rest-t { font-size: 15px; font-weight: 700; color: #1f2d2e; margin-bottom: 6px; }
.rest-b { font-size: 12px; color: #5f7f8e; line-height: 1.7; }
.run-log-card { background: #f9fbfc; border: 1px solid #d8dee4; border-radius: 12px; padding: 13px; margin-bottom: 12px; }
.run-log-title { font-size: 10px; font-weight: 700; color: #1f5e63; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 11px; }

.run-field { display: flex; flex-direction: column; gap: 4px; }
.run-field label { font-size: 10px; font-weight: 600; color: #958099; text-transform: uppercase; letter-spacing: 0.05em; }
.run-field-row { display: flex; align-items: center; gap: 5px; }
.run-inp { font-size: 14px; font-weight: 600; color: #1f2d2e; background: #fff; border: 1.5px solid #d8dee4; border-radius: 8px; padding: 8px; width: 100%; text-align: center; -webkit-appearance: none; min-height: 40px; }
.run-inp:focus { outline: none; border-color: #1f5e63; }
.run-unit { font-size: 10px; color: #958099; white-space: nowrap; }
.pace-calc { font-size: 12px; color: #1f5e63; background: #eaf2f3; border: 1px solid #b8d8db; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; text-align: center; font-weight: 600; }
.rpe-row { display: flex; gap: 5px; margin-top: 2px; }
.rpe-btn { flex: 1; font-size: 13px; font-weight: 600; padding: 8px 4px; border-radius: 8px; border: 1.5px solid #d8dee4; background: #fff; color: #958099; cursor: pointer; text-align: center; min-height: 40px; }
.rpe-btn.sel { background: #1f5e63; color: #fff; border-color: #1f5e63; }
.run-save-btn { width: 100%; font-size: 13px; font-weight: 700; background: #1f5e63; color: #fff; border: none; border-radius: 8px; padding: 11px; cursor: pointer; margin-top: 4px; min-height: 44px; }
.run-logged-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.run-logged-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.run-chip { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 20px; }
.run-chip.dist { background: #eaf2f3; color: #1f5e63; border: 1px solid #b8d8db; }

.run-chip.hr { background: #fce8f6; color: #8a2270; border: 1px solid #e8a8d8; }
.run-chip.cad { background: #e8f5ee; color: #1a6b3c; border: 1px solid #b2ddc4; }
.run-chip.rpe { background: #f4f7f8; color: #5f7f8e; border: 1px solid #d8dee4; }
.trend-section { margin-top: 12px; }
.trend-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #958099; margin-bottom: 8px; }
.trend-tabs { display: flex; gap: 5px; margin-bottom: 9px; flex-wrap: wrap; }
.tt-btn { font-size: 10px; font-weight: 600; padding: 5px 10px; border-radius: 20px; border: 1.5px solid #d8dee4; background: #fff; color: #5f7f8e; cursor: pointer; min-height: 30px; }
.tt-btn.active { background: #1f5e63; color: #fff; border-color: #1f5e63; }
.chart-wrap { background: #f9fbfc; border: 1px solid #d8dee4; border-radius: 10px; padding: 12px; }
canvas.trend-chart { width: 100%; height: 120px; display: block; }
.chart-empty { font-size: 12px; color: #958099; text-align: center; padding: 18px 0; }
.trend-insight { font-size: 11px; color: #2d5c60; background: #eaf2f3; border-radius: 8px; padding: 8px 10px; margin-top: 8px; line-height: 1.5; }
.mb-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.mb-label { font-size: 10px; color: #958099; width: 40px; flex-shrink: 0; text-align: right; }
.mb-bar-bg { flex: 1; height: 8px; background: #d8dee4; border-radius: 4px; overflow: hidden; }

</style>

<body>
<div class="hdr">
  <h1>My 12-Week Training Plan</h1>
  <p>Fast Fall speed + Planet Fitness lifting</p>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot ns"></div> Not started</div>
  <div class="legend-item"><div class="legend-dot inc"></div> Skipped</div>
  <div class="legend-item"><div class="legend-dot comp"></div> Complete</div>
</div>
<div class="wk-progress">
  <span class="wk-prog-label">Week progress</span>
  <div class="wk-prog-bar-bg"><div class="wk-prog-bar-fill" id="wkProgFill" style="width:0%"></div></div>
  <span class="wk-prog-pct" id="wkProgPct">0%</span>
</div>
<div class="summary-bar">
  <div class="summary-label">Mileage summary</div>
  <div class="summary-stats">
    <div class="sum-stat"><div class="sum-stat-n" id="sumTotal">0.0</div><div class="sum-stat-l">total miles</div></div>
    <div class="sum-stat"><div class="sum-stat-n" id="sumWeek">0.0</div><div class="sum-stat-l">this week</div></div>
    <div class="sum-stat pink"><div class="sum-stat-n" id="sumRuns">0</div><div class="sum-stat-l">runs logged</div></div>
    <div class="sum-stat"><div class="sum-stat-n" id="sumAvgPace">—</div><div class="sum-stat-l">avg pace</div></div>
  </div>
</div>
<div class="wk-strip">
  <div class="wk-strip-lbl">Fast Fall week — changes Tue / Thu / Sat</div>
  <div class="wk-scroll" id="wks"></div>
</div>
<div class="day-sec">
  <div class="dgrid" id="dg"></div>
  <div id="panel"></div>
</div>
<div class="bottom-pad"></div>

<script>
// ── DATA ──
var EX={
  hip_thrust:{name:"Hip thrust machine",sets:3,rN:"12-15",rD:"10",inc:5,st:45,unit:"lbs",tip:"Add 5 lbs when all 3 sets hit 15 reps easily."},
  leg_press:{name:"Leg press",sets:3,rN:"12",rD:"10",inc:10,st:70,unit:"lbs",tip:"Feet HIGH + WIDE = glutes. Add 10 lbs when 12 reps feel smooth."},
  rdl:{name:"Romanian deadlift",sets:3,rN:"10-12",rD:"8",inc:5,st:15,unit:"lbs",tip:"Dumbbells each hand. Start light - form always first."},
  abductor_m:{name:"Abductor machine",sets:3,rN:"15",rD:"12",inc:5,st:40,unit:"lbs",tip:"Push slow, hold 1 sec, slow return. Glute med - PT priority."},
  cable_kick:{name:"Cable kickback",sets:3,rN:"15",rD:"12",inc:2.5,st:10,unit:"lbs",tip:"Go light. Quality over weight - feel it in glute max not back."},
  lat_pull:{name:"Lat pulldown",sets:3,rN:"12",rD:"10",inc:5,st:40,unit:"lbs",tip:"Elbows to back pockets. Lead with back, not arms."},
  cable_row:{name:"Seated cable row",sets:3,rN:"12",rD:"10",inc:5,st:40,unit:"lbs",tip:"Pull to belly button. Torso stays upright - don't rock."},
  chest_press:{name:"Chest press machine",sets:3,rN:"12",rD:"10",inc:5,st:30,unit:"lbs",tip:"Back on pad the whole time. Slow return - 3 counts down."},
  shld_press:{name:"Shoulder press machine",sets:3,rN:"12",rD:"10",inc:5,st:20,unit:"lbs",tip:"Shoulders are small muscles - go slow with progression."},
  bicep_curl:{name:"Bicep curl (each hand)",sets:2,rN:"12",rD:"10",inc:2.5,st:10,unit:"lbs",tip:"Add 2.5 lbs per hand when both sets feel easy."},
  goblet_sq:{name:"Goblet squat",sets:3,rN:"12",rD:"10",inc:5,st:15,unit:"lbs",tip:"One dumbbell at chest. Sit DOWN between heels. Knees out."},
  step_up:{name:"Step-up (each leg)",sets:3,rN:"10",rD:"8",inc:5,st:0,unit:"lbs",tip:"Start bodyweight. Add dumbbells once form is solid."},
  ham_curl:{name:"Lying hamstring curl",sets:3,rN:"12-15",rD:"10",inc:5,st:30,unit:"lbs",tip:"SLOW down - 4 counts. Hips flat on pad the whole time."},
  abductor_f:{name:"Abductor machine",sets:3,rN:"15",rD:"12",inc:5,st:40,unit:"lbs",tip:"Same as Monday. Slow and controlled both directions."},
  glute_brdg:{name:"Glute bridge burnout",sets:2,rN:"20+hold",rD:"15",inc:0,st:0,unit:"BW",tip:"Bodyweight. Squeeze HARD at top. Add dumbbell on hips when 20 feels easy."}
};
var SESS_EX={mon:["hip_thrust","leg_press","rdl","abductor_m","cable_kick"],wed:["lat_pull","cable_row","chest_press","shld_press","bicep_curl"],fri:["goblet_sq","step_up","ham_curl","abductor_f","glute_brdg"]};
var DL=[4,8,12];
var RUN_DAYS=["mon","tue","wed","thu","fri","sat"];
var ICONS={mon:"🏋️",tue:"⚡",wed:"💪",thu:"⚡",fri:"🏋️",sat:"🏃",sun:"😴"};
var DCFG=[
  {k:"mon",t:"tl",c:"ct",lb:"Lower A"},{k:"tue",t:"ts",c:"cp",lb:"Speed"},
  {k:"wed",t:"tl",c:"ct",lb:"Upper"},{k:"thu",t:"ts",c:"cp",lb:"Speed"},
  {k:"fri",t:"tl",c:"ct",lb:"Lower B"},{k:"sat",t:"tg",c:"cs",lb:"Long run"},
  {k:"sun",t:"tr",c:"cx",lb:"Rest"}
];
function isDL(w){return DL.indexOf(w)!==-1;}

// ── STORAGE ──
function sl(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function gl(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function rl(k){try{localStorage.removeItem(k);}catch(e){}}
function saveLog(k,w,v){sl("lg_"+k+"_w"+w,v);}
function loadLog(k,w){return gl("lg_"+k+"_w"+w,null);}
function delLog(k,w){rl("lg_"+k+"_w"+w);}
function saveRun(day,week,data){sl("rl_"+day+"_w"+week,data);}
function loadRun(day,week){return gl("rl_"+day+"_w"+week,null);}
function delRun(day,week){rl("rl_"+day+"_w"+week);}
function saveDayStatus(day,week,s){try{localStorage.setItem("ds_"+day+"_w"+week,s);}catch(e){}}
function loadDayStatus(day,week){try{return localStorage.getItem("ds_"+day+"_w"+week)||null;}catch(e){return null;}}
function clearDayStatus(day,week){try{localStorage.removeItem("ds_"+day+"_w"+week);}catch(e){}}

function getTarget(ek,week){
  var ex=EX[ek],last=null;
  for(var w=week-1;w>=1;w--){var l=loadLog(ek,w);if(l!==null){last={w:w,v:l};break;}}
  var base=last?last.v:ex.st;
  if(last&&!isDL(last.w)&&!isDL(week)&&ex.unit!=="BW") base=last.v+ex.inc;
  if(isDL(week)&&ex.unit!=="BW") base=Math.round((base*0.9)/2.5)*2.5;
  return base;
}

// ── DAY STATUS - uses IDs on buttons, no inline args ──
var cw=1, sd="mon";

function markDay(status) {
  var cur = loadDayStatus(sd, cw);
  if (cur === status) { clearDayStatus(sd, cw); }
  else { saveDayStatus(sd, cw, status); }
  buildGrid();
  updateWeekProgress();
  refreshCompletionBar();
}

function refreshCompletionBar() {
  var s = loadDayStatus(sd, cw);
  var doneBtn = document.getElementById("btn-complete");
  var skipBtn = document.getElementById("btn-skip");
  if (!doneBtn || !skipBtn) return;
  doneBtn.className = "comp-btn" + (s === "complete" ? " done" : "");
  doneBtn.textContent = s === "complete" ? "✓ Completed" : "Mark complete";
  skipBtn.className = "comp-btn" + (s === "incomplete" ? " skip" : "");
  skipBtn.textContent = s === "incomplete" ? "✕ Skipped" : "Mark skipped";
  // also refresh status tag
  var tagEl = document.getElementById("status-tag");
  if (tagEl) {
    if (s === "complete") { tagEl.innerHTML = "<span class='tag done-tag'>Completed</span>"; }
    else if (s === "incomplete") { tagEl.innerHTML = "<span class='tag skip-tag'>Skipped</span>"; }
    else { tagEl.innerHTML = ""; }
  }
}

function updateWeekProgress(){
  var done=0,total=6; // mon-sat
  ["mon","tue","wed","thu","fri","sat"].forEach(function(d){
    if(loadDayStatus(d,cw)==="complete") done++;
  });
  var pct=Math.round((done/total)*100);
  var fill=document.getElementById("wkProgFill"),pctEl=document.getElementById("wkProgPct");
  if(fill) fill.style.width=pct+"%";
  if(pctEl) pctEl.textContent=pct+"%";
}

var selRpe={};
var curTM="pace";
function calcPace(dist,mins){if(!dist||!mins||dist<=0||mins<=0)return null;var spm=(mins*60)/dist,m=Math.floor(spm/60),s=Math.round(spm%60);return m+":"+(s<10?"0":"")+s;}
function paceToSecs(p){if(!p)return null;var a=p.toString().split(":");return parseInt(a[0])*60+(parseInt(a[1])||0);}
function secsToStr(s){var m=Math.floor(s/60),sc=Math.round(s%60);return m+":"+(sc<10?"0":"")+sc;}
function getAllRuns(){
  var all=[];
  for(var w=1;w<=12;w++){for(var di=0;di<RUN_DAYS.length;di++){var r=loadRun(RUN_DAYS[di],w);if(r)all.push({week:w,day:RUN_DAYS[di],data:r});}}
  return all;
}
function updateSummary(){
  var all=getAllRuns(),tot=0,tsecs=0,tdist=0,wkDist=0;
  all.forEach(function(e){
    var d=parseFloat(e.data.dist)||0,m=parseFloat(e.data.mins)||0;
    tot+=d; if(d>0&&m>0){tsecs+=m*60;tdist+=d;} if(e.week===cw) wkDist+=d;
  });
  document.getElementById("sumTotal").textContent=tot.toFixed(1);
  document.getElementById("sumWeek").textContent=wkDist.toFixed(1);
  document.getElementById("sumRuns").textContent=all.length;
  document.getElementById("sumAvgPace").textContent=tdist>0?secsToStr(tsecs/tdist)+"/mi":"—";
}
function liveCalcPace(day){
  var dEl=document.getElementById("inp-dist-"+day),mEl=document.getElementById("inp-mins-"+day),pEl=document.getElementById("pace-calc-"+day);
  if(!dEl||!mEl||!pEl) return;

function selectRpe(day,v){

function saveRunLog(day,week){
  var dEl=document.getElementById("inp-dist-"+day),mEl=document.getElementById("inp-mins-"+day),hrEl=document.getElementById("inp-hr-"+day),cadEl=document.getElementById("inp-cad-"+day);
  var dist=dEl?dEl.value:"",mins=mEl?mEl.value:"",hr=hrEl?hrEl.value:"",cad=cadEl?cadEl.value:"",rpe=selRpe[day]||0;
  if(!dist&&!mins&&!hr&&!cad&&!rpe) return;
  saveRun(day,week,{dist:dist||null,mins:mins||null,pace:calcPace(parseFloat(dist),parseFloat(mins)),hr:hr?parseInt(hr):null,cad:cad?parseInt(cad):null,rpe:rpe||null});
  render(sd);
}
function delRunAndRefresh(day,week){delRun(day,week);delete selRpe[day];render(sd);}

function drawChart(metric){
  curTM=metric;
  document.querySelectorAll(".tt-btn").forEach(function(b){b.classList.toggle("active",b.dataset.m===metric);});
  var canvas=document.getElementById("trendCanvas"); if(!canvas) return;
  var all=getAllRuns(),labels=[],vals=[];
  all.forEach(function(e){
    var r=e.data,v=null;
    if(metric==="pace"&&r.pace) v=paceToSecs(r.pace);
    else if(metric==="dist"&&r.dist) v=parseFloat(r.dist);
    else if(metric==="hr"&&r.hr) v=r.hr;
    else if(metric==="cad"&&r.cad) v=r.cad;
    else if(metric==="rpe"&&r.rpe) v=r.rpe;
    if(v!==null){labels.push("W"+e.week);vals.push(v);}
  });
  var empty=document.getElementById("chartEmpty"),ins=document.getElementById("trendInsight");
  if(vals.length<2){if(empty)empty.style.display="block";canvas.style.display="none";if(ins)ins.style.display="none";return;}
  if(empty)empty.style.display="none"; canvas.style.display="block";
  var ctx=canvas.getContext("2d"),W=canvas.offsetWidth,H=120;
  canvas.width=W; canvas.height=H; ctx.clearRect(0,0,W,H);
  var pad={t:10,r:10,b:24,l:38},cw2=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var pts=vals.map(function(v,i){return{x:pad.l+(i/Math.max(vals.length-1,1))*cw2,y:pad.t+ch-(((v-mn)/rng)*ch*0.85+ch*0.075)};});
  ctx.strokeStyle="#d8dee4";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+ch);ctx.lineTo(pad.l+cw2,pad.t+ch);ctx.stroke();
  ctx.strokeStyle="#1f5e63";ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.lineCap="round";
  ctx.beginPath();pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.stroke();
  pts.forEach(function(p){ctx.fillStyle="#fff";ctx.strokeStyle="#1f5e63";ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.stroke();});
  ctx.fillStyle="#958099";ctx.font="9px Poppins,sans-serif";ctx.textAlign="center";
  pts.forEach(function(p,i){if(i%Math.ceil(pts.length/8)===0||i===pts.length-1)ctx.fillText(labels[i],p.x,H-6);});
  if(ins&&vals.length>=2){
    var f=vals[0],l2=vals[vals.length-1],msg="";
    if(metric==="pace"){var d=f-l2;msg=d>0?"Pace improved by "+secsToStr(d)+"/mile!":d<0?"Pace "+secsToStr(-d)+"/mile slower - normal in harder weeks.":"Pace holding steady.";}
    else if(metric==="dist"){var d2=l2-f;msg=d2>0?"Distance up "+d2.toFixed(1)+" miles. Aerobic base growing!":"Distance holding steady.";}
    else if(metric==="hr"){var d3=f-l2;msg=d3>0?"HR dropped "+Math.round(d3)+" bpm - real fitness gains!":d3<0?"HR up "+Math.round(-d3)+" bpm - watch hydration.":"HR holding steady.";}
    else if(metric==="cad"){var d4=l2-f;msg=d4>0?"Cadence up "+Math.round(d4)+" spm. It's working!":"Cadence at "+Math.round(l2)+" spm.";}
    else{msg="Effort logged across "+vals.length+" runs.";}
    ins.textContent=msg; ins.style.display="block";
  }
}
function buildWeeklyBars(){
  var mx=0,wt=[];
  for(var w=1;w<=12;w++){var t=0;RUN_DAYS.forEach(function(d){var r=loadRun(d,w);if(r&&r.dist)t+=parseFloat(r.dist)||0;});wt.push(t);if(t>mx)mx=t;}
  if(mx===0) return "<div class='chart-empty'>Log runs to see weekly mileage.</div>";
  var h="";
  for(var i=0;i<12;i++){var pct=mx>0?Math.round((wt[i]/mx)*100):0;h+="<div class='mb-row'><span class='mb-label'>Wk "+(i+1)+"</span><div class='mb-bar-bg'><div class='mb-bar-fill' style='width:"+pct+"%'></div></div><span class='mb-val'>"+(wt[i]>0?wt[i].toFixed(1)+" mi":"—")+"</span></div>";}
  return h;
}

// ── BIND EVENTS after render (avoids all inline handler issues) ──
function bindPanelEvents(day,week){
  // completion buttons
  var doneBtn=document.getElementById("btn-complete");
  var skipBtn=document.getElementById("btn-skip");
  if(doneBtn) doneBtn.addEventListener("click",function(){markDay("complete");});
  if(skipBtn) skipBtn.addEventListener("click",function(){markDay("incomplete");});

  // run log
  var distInp=document.getElementById("inp-dist-"+day);
  var minsInp=document.getElementById("inp-mins-"+day);
  if(distInp) distInp.addEventListener("input",function(){liveCalcPace(day);});
  if(minsInp) minsInp.addEventListener("input",function(){liveCalcPace(day);});

  var saveRunBtn=document.getElementById("save-run-btn");
  if(saveRunBtn) saveRunBtn.addEventListener("click",function(){saveRunLog(day,week);});

  var delRunBtn=document.getElementById("del-run-btn");
  if(delRunBtn) delRunBtn.addEventListener("click",function(){delRunAndRefresh(day,week);});

  // rpe buttons
  for(var i=1;i<=5;i++){
    (function(v){
      var b=document.getElementById("rpe"+v+"_"+day);
      if(b) b.addEventListener("click",function(){selectRpe(day,v);});
    })(i);
  }

  // trend tabs
  document.querySelectorAll(".tt-btn").forEach(function(b){
    b.addEventListener("click",function(){drawChart(this.dataset.m);});
  });

  // lift save buttons
  var exKeys=SESS_EX[day];
  if(exKeys){
    exKeys.forEach(function(ek){
      var inp=document.getElementById("i_"+ek+"_"+week);
      var btn=document.getElementById("save_"+ek+"_"+week);
      if(btn&&inp) btn.addEventListener("click",function(){
        var v=parseFloat(inp.value);
        if(isNaN(v)||v<=0){inp.style.borderColor="#c04f9d";return;}
        saveLog(ek,week,v);render(sd);
      });
      var editBtn=document.getElementById("edit_"+ek+"_"+week);
      if(editBtn) editBtn.addEventListener("click",function(){delLog(ek,week);render(sd);});
      var bwBtn=document.getElementById("bw_"+ek+"_"+week);
      if(bwBtn) bwBtn.addEventListener("click",function(){saveLog(ek,week,0);render(sd);});
    });
  }
}

    wu:["Clamshells w/ band - 15 reps each side","Glute bridge holds - 2x10 - 3-sec squeeze at top","Standing fire hydrant - 12 each side","Hip flexor stretch - 40 sec each side"],
    cd:["90/90 hip stretch - 60 sec each side","Piriformis stretch - 45 sec each side","IT band foam roll - 60-90 sec each side"]}
};

// ── GRID + WEEK ──
function buildWks(){
  var h="";for(var i=1;i<=12;i++){var d=DL.indexOf(i)!==-1;h+="<button class='wb"+(i===1?" active":"")+(d?" dl":"")+"' data-w='"+i+"'>Week "+i+"</button>";}
  document.getElementById("wks").innerHTML=h;
  document.querySelectorAll(".wb").forEach(function(b){
    b.addEventListener("click",function(){
      cw=parseInt(this.dataset.w);
      document.querySelectorAll(".wb").forEach(function(x){x.classList.remove("active");});
      this.classList.add("active");
      buildGrid();updateWeekProgress();updateSummary();render(sd);
    });
  });
}
function buildGrid(){
  document.getElementById("dg").innerHTML=DCFG.map(function(d){
    var status=loadDayStatus(d.k,cw);
    var sc=status==="complete"?" complete":status==="incomplete"?" incomplete":"";
    return "<div class='dp "+d.t+sc+(sd===d.k?" sel":"")+"' data-day='"+d.k+"'><div class='dp-n'>"+d.k.charAt(0).toUpperCase()+d.k.slice(1)+"</div><div class='dp-i'>"+ICONS[d.k]+"</div><div class='dp-l "+d.c+"'>"+d.lb+"</div></div>";
  }).join("");
  document.querySelectorAll(".dp").forEach(function(el){
    el.addEventListener("click",function(){
      sd=this.dataset.day;
      buildGrid();
      render(sd);
      setTimeout(function(){document.getElementById("panel").scrollIntoView({behavior:"smooth",block:"nearest"});},50);
    });
  });
}

// ── RENDER ──
function renderLift(key){
  var meta=LMETA[key],exKeys=SESS_EX[key],dl=isDL(cw);
  var dn=key==="mon"?"Monday":key==="wed"?"Wednesday":"Friday";
  var statsH=meta.stats.map(function(s){return "<div class='stat'><div class='stat-n'>"+s[0]+"</div><div class='stat-l'>"+s[1]+"</div></div>";}).join("");
  var wuH=meta.wu.map(function(x){return "<li>"+x+"</li>";}).join("");
  var cdH=meta.cd.map(function(x){return "<li>"+x+"</li>";}).join("");
  var exH="";
  for(var i=0;i<exKeys.length;i++){
    var ek=exKeys[i],ex=EX[ek],target=getTarget(ek,cw),logged=loadLog(ek,cw),reps=dl?ex.rD:ex.rN;
    var tDisp=ex.unit==="BW"?"Bodyweight":target+" lbs";
    var cnt=0;for(var w=1;w<=12;w++){if(loadLog(ek,w)!==null)cnt++;}
    var pct=Math.round((cnt/12)*100);
    var logH="";
    if(logged!==null){
      logH="<div class='log-row'><span class='log-done'>Done: "+(ex.unit==="BW"?"Bodyweight":logged+" lbs")+"</span><button class='log-edit' id='edit_"+ek+"_"+cw+"'>edit</button></div>";
    } else if(ex.unit==="BW"){
      logH="<div class='log-row'><button class='log-btn' id='bw_"+ek+"_"+cw+"'>Mark done</button></div>";
    } else {
      logH="<div class='log-row'><input class='log-inp' id='i_"+ek+"_"+cw+"' type='number' inputmode='decimal' placeholder='"+target+"'><span class='log-unit'>lbs</span><button class='log-btn' id='save_"+ek+"_"+cw+"'>Save</button></div>";
    }
    exH+="<div class='ex-card'><div class='ex-name'>"+ex.name+"</div><div class='ex-meta'>"+ex.sets+" sets x "+reps+" reps</div><div class='ex-tgt"+(dl?" dl":"")+"'>Target: "+tDisp+"</div>"+logH+"<div class='prog-bg'><div class='prog-fill' style='width:"+pct+"%'></div></div><div class='prog-lbl'>"+cnt+"/12 weeks logged</div><div class='ex-tip'>"+ex.tip+"</div></div>";
  }
  var dlNote=dl?"<div class='note amb'>Deload week: weights drop to ~90%, fewer reps. Your body recovers and grows stronger.</div>":"";
  var poNote=dl?"":"<div class='note'>Log your actual weight after each session - next week's target updates automatically.</div>";
  document.getElementById("panel").innerHTML=
    "<div class='panel'><div class='panel-head'><div class='panel-eye'>"+dn+" - Week "+cw+(dl?" - deload":"")+"</div>"+
    "<div class='panel-title'>"+meta.title+"</div>"+
    "<div class='tags'><span class='tag lift'>Lifting</span><span class='tag run'>Easy run</span>"+(dl?"<span class='tag dl'>Deload week</span>":"")+"<span id='status-tag'>"+statusTagHTML()+"</span></div></div>"+
    "<div class='panel-body'>"+completionBarHTML()+
    "<div class='stats'>"+statsH+"</div>"+
    "<div class='ibox grn'><div class='ibox-t'>Running today</div><div class='ibox-b'>"+meta.runNote+"</div></div>"+
    dlNote+poNote+
    "<div class='sec-t'>Warm-up</div><ul class='slist'>"+wuH+"</ul>"+
    "<div class='sec-t'>Exercises + progressive overload tracker</div>"+exH+
    "<div class='sec-t'>Cool-down</div><ul class='slist'>"+cdH+"</ul>"+
    "<div class='sec-t'>Easy run log</div>"+buildRunLog(key,cw)+
    "</div></div>";
  bindPanelEvents(key,cw);
  setTimeout(function(){drawChart(curTM);updateSummary();},50);
}

function render(key){
  var p=document.getElementById("panel"),wk=WK[cw];
  updateSummary();updateWeekProgress();
  if(key==="sun"){
    p.innerHTML="<div class='panel'><div class='panel-head'><div class='panel-eye'>Sunday - every week</div><div class='panel-title'>Full rest day</div><div class='tags'><span class='tag rst'>Rest</span><span id='status-tag'>"+statusTagHTML()+"</span></div></div><div class='panel-body'>"+completionBarHTML()+"<div class='rest-box'><div class='rest-e'>😴</div><div class='rest-t'>This day is sacred.</div><div class='rest-b'>Your body builds muscle and gets faster during recovery - not during the workout. Protect Sunday every single week.<br><br>Optional: easy walk, foam rolling, 90/90 hip stretch.</div></div></div></div>";
    bindPanelEvents(key,cw);return;
  }
  if(key==="sat"){
    var r=wk.sat;
    p.innerHTML="<div class='panel'><div class='panel-head'><div class='panel-eye'>Saturday - Week "+cw+"</div><div class='panel-title'>"+r.r+"</div><div class='tags'><span class='tag lng'>Long run</span><span id='status-tag'>"+statusTagHTML()+"</span></div></div><div class='panel-body'>"+completionBarHTML()+"<div class='ibox grn'><div class='ibox-t'>This week's long run</div><div class='ibox-b'>"+r.n+"</div></div><div class='note'>Easy pace = hold a full conversation. If breathing hard, slow down. No lifting today.</div>"+(wk.f?"<div class='focus-box'><div class='focus-t'>Week "+cw+" focus: "+wk.f+"</div><div class='focus-b'>"+wk.fd+"</div></div>":"")+"<div class='sec-t'>Run log</div>"+buildRunLog("sat",cw)+"</div></div>";
    bindPanelEvents(key,cw);setTimeout(function(){drawChart(curTM);},50);return;
  }
  if(key==="tue"||key==="thu"){
    var r2=key==="tue"?wk.tue:wk.thu,dn2=key==="tue"?"Tuesday":"Thursday";
    p.innerHTML="<div class='panel'><div class='panel-head'><div class='panel-eye'>"+dn2+" - Week "+cw+"</div><div class='panel-title'>Fast Fall speed workout</div><div class='tags'><span class='tag spd'>Speed work</span><span id='status-tag'>"+statusTagHTML()+"</span></div></div><div class='panel-body'>"+completionBarHTML()+"<div class='ibox red'><div class='ibox-t'>Today's workout</div><div class='ibox-b'><strong>Warm-up:</strong> "+r2.wu+"<br><strong>Workout:</strong> "+r2.wo+"<br><strong>Cool-down:</strong> "+r2.cd+"</div></div><div class='note'>"+r2.n+"</div><div class='note amb'>No lifting today. Come in fresh - speed work is the only priority.</div>"+(wk.f?"<div class='focus-box'><div class='focus-t'>Week "+cw+" focus: "+wk.f+"</div><div class='focus-b'>"+wk.fd+"</div></div>":"")+"<div class='sec-t'>Run log</div>"+buildRunLog(key,cw)+"</div></div>";
    bindPanelEvents(key,cw);setTimeout(function(){drawChart(curTM);},50);return;
  }
  renderLift(key);
}

buildWks();buildGrid();updateWeekProgress();render("mon");
</script>
</body>
</html>
